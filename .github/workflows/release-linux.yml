name: release-linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            dpkg-dev \
            libblkid-dev \
            libgtk-3-dev \
            ninja-build \
            pkg-config

      - name: Resolve Dart and Flutter packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release artifacts
        run: ./scripts/build-release-artifacts.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nzapret-desktop-linux
          path: dist/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
